[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "sola"
version = "0.1.0"
description = "Interpreter for the Sola programming language"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
sola = "sola.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["sola*"]

[tool.setuptools.package-data]
sola = ["py.typed"]
