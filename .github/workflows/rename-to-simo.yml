name: Rename language to Simo

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/rename-to-simo.yml

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rename package and example paths
        shell: bash
        run: |
          set -euo pipefail
          if [ -d sola ]; then
            git mv sola simo
          fi
          if [ -f examples/section16.sola ]; then
            git mv examples/section16.sola examples/section16.simo
          fi

      - name: Replace all Sola identity references
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          root = Path('.')
          workflow = Path('.github/workflows/rename-to-simo.yml')
          text_suffixes = {'.py', '.md', '.toml', '.simo', '.txt', '.yml', '.yaml'}

          for path in root.rglob('*'):
              if not path.is_file() or '.git' in path.parts or path == workflow:
                  continue
              if path.suffix.lower() not in text_suffixes and path.name not in {'.gitignore'}:
                  continue

              text = path.read_text(encoding='utf-8')
              updated = text.replace('Sola', 'Simo').replace('sola', 'simo')

              if path == Path('README.md'):
                  updated = updated.replace(
                      '- **Name:** Simo (means "Sun" / "Pure, stand-alone") — the friendly sibling to Lua ("Moon")',
                      '- **Name:** Simo — a beginner-friendly programming language focused on readable syntax.'
                  )
                  marker = '## 1. Core Philosophy\n'
                  install = '''## Current Interpreter\n\nThe current Milestone 1 interpreter requires **Python 3.11+**.\n\n```bash\npip install -e .\nsimo run examples/section16.simo\n```\n\nYou can also run it without the installed command:\n\n```bash\npython -m simo examples/section16.simo\n```\n\n---\n\n'''
                  if '## Current Interpreter' not in updated and marker in updated:
                      updated = updated.replace(marker, install + marker, 1)

              if path == Path('pyproject.toml'):
                  updated = updated.replace('name = "simo"', 'name = "simo-language"')
                  updated = updated.replace('version = "0.1.0"', 'version = "0.2.0"')

              if updated != text:
                  path.write_text(updated, encoding='utf-8')
          PY

      - name: Remove one-time workflow and reject stale names
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/rename-to-simo.yml
          if grep -RInE 'Sola|sola|\.sola' . --exclude-dir=.git; then
            echo 'Old Sola references remain.' >&2
            exit 1
          fi

      - name: Run tests
        shell: bash
        run: python -m unittest discover -s tests -v

      - name: Run Section 16 example
        shell: bash
        run: python -m simo examples/section16.simo

      - name: Commit and push rename
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Rename Sola language to Simo'
          git push origin main
