name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install .
      - run: python -m unittest discover -s tests -v
      - run: simo run examples/section16.simo
      - run: simo build examples/web/main.simo --target web --output /tmp/simo-web
      - run: simo build examples/pwa/main.simo --target pwa --output /tmp/simo-pwa
      - run: simo check examples/desktop/main.simo
      - run: simo doctor
